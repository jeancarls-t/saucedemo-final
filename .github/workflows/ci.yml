name: CI - Serenity Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Instalar Firefox
        run: |
          sudo apt-get update
          sudo apt-get install -y firefox
          # Verificar instalación
          which firefox
          firefox --version

      - name: Instalar Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: Configurar Xvfb
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -ac &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Ejecutar pruebas con Chrome
        run: mvn clean verify -Dwebdriver.driver=chrome
        env:
          CHROME_OPTIONS: --headless --no-sandbox --disable-dev-shm-usage --disable-gpu

      - name: Subir reportes de Serenity
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: serenity-reports
          path: target/site/serenity/