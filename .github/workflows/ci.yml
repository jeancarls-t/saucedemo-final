name: CI - Serenity Tests (Firefox)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven


      - name: Instalar Firefox
        run: |
          sudo apt-get update
          sudo apt-get install -y firefox
          firefox --version
      

      - name: Instalar GeckoDriver
        run: |
          wget -q https://github.com/mozilla/geckodriver/releases/download/v0.35.0/geckodriver-v0.35.0-linux64.tar.gz
          tar -xzf geckodriver-v0.35.0-linux64.tar.gz
          chmod +x geckodriver
          sudo mv geckodriver /usr/local/bin/
          geckodriver --version
      

      - name: Configurar Xvfb
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -ac &
          echo "DISPLAY=:99" >> $GITHUB_ENV
      

      - name: Ejecutar pruebas con Firefox
        run: mvn clean verify -Dwebdriver.driver=firefox
        env:
          MOZ_HEADLESS: 1


      - name: Subir reportes de Serenity
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: serenity-reports
          path: target/site/serenity/

      - name: Subir reportes de pruebas
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports/