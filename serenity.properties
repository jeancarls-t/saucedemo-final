# ============================================
# CONFIGURACIÓN PARA CI (CHROME HEADLESS)
# ============================================
webdriver.driver=chrome
#webdriver.driver=firefox
chrome.switches=--headless,--no-sandbox,--disable-dev-shm-usage,--disable-gpu,--window-size=1920,1080

serenity.timeout=60000
webdriver.wait.for.timeout=60000
webdriver.timeouts.implicitlywait=20000
webdriver.timeouts.pageload=60000
serenity.restart.browser.for.each=scenario
serenity.use.unique.browser=true