# ============================================
# CONFIGURACIÓN PARA CHROME (CON TODAS LAS OPCIONES DE SEGURIDAD DESHABILITADAS)
# ============================================
webdriver.driver=chrome

chrome.switches=\
--headless,\
--no-sandbox,\
--disable-dev-shm-usage,\
--disable-gpu,\
--window-size=1920,1080,\
--disable-notifications,\
--disable-web-security,\
--disable-features=VizDisplayCompositor,\
--disable-features=ChromeWhatsNewUI,\
--disable-features=ChromeWhatsNewService,\
--disable-features=PasswordManagerRedirection,\
--disable-features=PasswordImport,\
--disable-features=PasswordGeneration,\
--disable-features=PasswordManagerUI,\
--disable-features=GooglePasswordManager,\
--disable-features=AutofillPasswordGeneration,\
--disable-save-password-bubble,\
--disable-password-manager-reauthentication,\
--disable-password-generation,\
--disable-password-import,\
--disable-password-export,\
--disable-password-manager,\
--disable-password-manager-service,\
--disable-password-manager-redirection,\
--disable-password-manager-ui,\
--disable-password-manager-google,\
--disable-password-manager-local,\
--disable-password-manager-authentication,\
--disable-password-manager-prompting,\
--disable-password-manager-save-bubble,\
--disable-password-manager-update-bubble,\
--disable-password-manager-warning,\
--disable-password-manager-error,\
--disable-password-manager-sync,\
--disable-password-manager-sync-service,\
--disable-password-manager-sync-ui,\
--disable-password-manager-sync-error,\
--disable-password-manager-sync-warning,\
--disable-password-manager-sync-prompt,\
--disable-password-manager-sync-update,\
--disable-password-manager-sync-save-bubble,\
--disable-password-manager-sync-update-bubble,\
--disable-password-manager-sync-warning-bubble,\
--disable-password-manager-sync-error-bubble,\
--disable-password-manager-sync-prompt-bubble,\
--disable-password-manager-sync-update-prompt,\
--disable-password-manager-sync-save-prompt,\
--disable-password-manager-sync-error-prompt,\
--disable-password-manager-sync-warning-prompt,\
--disable-password-manager-sync-service-prompt,\
--disable-password-manager-sync-ui-prompt,\
--disable-password-manager-sync-service-ui,\
--disable-password-manager-sync-service-error,\
--disable-password-manager-sync-service-warning,\
--disable-password-manager-sync-service-prompt,\
--disable-password-manager-sync-service-update,\
--disable-password-manager-sync-service-save-bubble,\
--disable-password-manager-sync-service-update-bubble,\
--disable-password-manager-sync-service-warning-bubble,\
--disable-password-manager-sync-service-error-bubble,\
--disable-password-manager-sync-service-prompt-bubble,\
--disable-password-manager-sync-service-update-prompt,\
--disable-password-manager-sync-service-save-prompt,\
--disable-password-manager-sync-service-error-prompt,\
--disable-password-manager-sync-service-warning-prompt
# CONFIGURACIÓN PARA LOCAL (FIREFOX)
# ============================================
#webdriver.driver=firefox
#firefox.options.args=--private

# ============================================
# TIEMPOS DE ESPERA
# ============================================
serenity.timeout=60000
webdriver.wait.for.timeout=60000
webdriver.timeouts.implicitlywait=20000
webdriver.timeouts.pageload=60000

# ============================================
# COMPORTAMIENTO
# ============================================
serenity.restart.browser.for.each=scenario
serenity.use.unique.browser=true
serenity.webdriver.clear.cookies=each
serenity.take.screenshots=FOR_EACH_ACTION
