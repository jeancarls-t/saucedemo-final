# ============================================
# CONFIGURACIÓN MÍNIMA PARA PRUEBAS LOCALES
# ============================================
# Usar Firefox local (sin alertas de seguridad)
webdriver.driver=firefox

# Opciones básicas para Firefox
firefox.options.args=--private

# Tiempos de espera estándar
serenity.timeout=15000
webdriver.wait.for.timeout=15000
webdriver.timeouts.implicitlywait=5000

# Comportamiento básico
serenity.restart.browser.for.each=scenario
serenity.use.unique.browser=true