# ============================================
# CONFIGURACIÓN PARA CI (FIREFOX)
# ============================================
webdriver.driver=firefox

# Opciones para Firefox headless
firefox.options.args=--headless,--private


firefox.binary=/usr/bin/firefox

# ============================================
# TIEMPOS DE ESPERA
# ============================================
serenity.timeout=60000
webdriver.wait.for.timeout=60000
webdriver.timeouts.implicitlywait=20000
webdriver.timeouts.pageload=60000

# ============================================
# COMPORTAMIENTO
# ============================================
serenity.restart.browser.for.each=scenario
serenity.use.unique.browser=true
serenity.webdriver.clear.cookies=each
serenity.take.screenshots=FOR_EACH_ACTION
