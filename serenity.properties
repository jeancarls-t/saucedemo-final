# ============================================
# CONFIGURACIėN DEL NAVEGADOR
# ============================================
# PARA EJECUCIėN EN CI/CD (Chrome) - DESCOMENTAR PARA CI
#webdriver.driver=chrome

# PARA EJECUCIėN LOCAL (Firefox) - COMENTAR PARA CI
webdriver.driver=firefox

# ============================================
# CONFIGURACIėN PARA CHROME (CI/CD)
# ============================================
chrome.switches=--headless,--no-sandbox,--disable-dev-shm-usage,--disable-gpu,--window-size=1920,1080,--disable-notifications,--disable-password-manager-reauthentication

# Opciones adicionales para Chrome en CI
chrome.options.args=--headless,--no-sandbox,--disable-dev-shm-usage,--disable-gpu,--window-size=1920,1080

# ============================================
# CONFIGURACIėN PARA FIREFOX (LOCAL)
# ============================================
firefox.options.args=--private,--headless
firefox.binary=/usr/bin/firefox

# ============================================
# TIEMPOS DE ESPERA (AUMENTADOS PARA CI)
# ============================================
serenity.timeout=60000


webdriver.wait.for.timeout=60000


webdriver.timeouts.implicitlywait=20000


webdriver.timeouts.pageload=60000


webdriver.timeouts.script=60000

# ============================================
# COMPORTAMIENTO DEL NAVEGADOR
# ============================================
# Reiniciar navegador despuķs de cada escenario
serenity.restart.browser.for.each=scenario

# Usar un navegador ·nico por prueba
serenity.use.unique.browser=true

# Limpiar cookies entre escenarios
serenity.webdriver.clear.cookies=each

# ============================================
# REPORTES Y LOGS
# ============================================
# Tomar capturas de pantalla en cada acci¾n
serenity.take.screenshots=FOR_EACH_ACTION

# Colores en consola
serenity.console.colors=true

# Nivel de logging
serenity.logging=INFO

